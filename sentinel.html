<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Sentinel-2 Thailand 2026 (Median, Cloud-masked)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin: 0; height: 100%; }
  #map { width: 100%; height: 100%; }
  .info-box {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: rgba(255,255,255,0.92); padding: 8px 12px; border-radius: 6px;
    font-family: sans-serif; font-size: 12px; max-width: 260px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="info-box">
  <b>Sentinel-2 Thailand 2026</b><br>
  Median composite (2026-01-01 – 2026-12-31)<br>
  Cloud-masked with Cloud Score+ (&ge; 0.6)<br>
  True colour B4/B3/B2 &middot; GISTDA GeoAI
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var map = L.map('map').setView([13.0, 101.0], 6);

  var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    maxZoom: 20, subdomains: ['mt0','mt1','mt2','mt3'], attribution: '&copy; Google Maps'
  }).addTo(map);
  var googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
    maxZoom: 20, subdomains: ['mt0','mt1','mt2','mt3'], attribution: '&copy; Google Maps'
  });

  var sentinel = L.tileLayer('https://earthengine.googleapis.com/v1/projects/innotech-373702/maps/b82cb5c151a90b2b1782aff9ea3f8592-40d64497b7578ba0026c9cb9f6639e41/tiles/{z}/{x}/{y}', {
    maxZoom: 20, attribution: 'Sentinel-2 / Copernicus via Google Earth Engine', opacity: 1.0
  }).addTo(map);

  var outline = L.tileLayer('https://earthengine.googleapis.com/v1/projects/innotech-373702/maps/18b0b7f6303eeeaa1bfa05f538fdee8d-b7a853dd57b68e273b47bb7292413e0e/tiles/{z}/{x}/{y}', {
    maxZoom: 20, attribution: 'Thailand boundary (FAO GAUL)'
  }).addTo(map);

  L.control.layers(
    { "Google Satellite": googleSat, "Google Hybrid": googleHybrid },
    { "Sentinel-2 2026 (median)": sentinel, "Thailand outline": outline },
    { collapsed: false }
  ).addTo(map);
</script>
</body>
</html>
